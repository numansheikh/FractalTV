<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Option A — Search First</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e14; color: #fff; font-family: -apple-system, sans-serif; font-size: 13px; display: flex; height: 100vh; overflow: hidden; }

  /* Nav Rail */
  .rail { width: 48px; background: #0a0a12; border-right: 1px solid rgba(255,255,255,0.07); display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px; flex-shrink: 0; }
  .rail-icon { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555566; font-size: 16px; }
  .rail-icon.active { background: rgba(74,158,255,0.12); color: #4a9eff; }
  .rail-spacer { flex: 1; }
  .rail-divider { width: 24px; height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Top bar — minimal */
  .topbar { height: 44px; border-bottom: 1px solid rgba(255,255,255,0.06); background: #0a0a12; display: flex; align-items: center; padding: 0 16px; gap: 8px; }
  .topbar-hint { font-size: 11px; color: #444455; margin-left: auto; }

  /* Hero search area */
  .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; padding: 48px; }
  .hero-label { font-size: 13px; color: #555566; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; }
  .search-wrap { width: 100%; max-width: 600px; position: relative; }
  .search-input { width: 100%; height: 48px; background: #16161e; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 15px; padding: 0 16px 0 44px; outline: none; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #555566; font-size: 16px; }
  .search-hint { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 10px; color: #333344; background: #1e1e28; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.06); }

  /* Recent items */
  .recent-section { width: 100%; max-width: 700px; }
  .recent-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #444455; margin-bottom: 10px; }
  .recent-list { display: flex; gap: 10px; }
  .recent-item { flex: 1; background: #16161e; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .recent-item:hover { background: #1e1e28; }
  .recent-thumb { width: 36px; height: 52px; background: #1e1e28; border-radius: 4px; flex-shrink: 0; object-fit: cover; }
  .recent-info { min-width: 0; }
  .recent-title { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-meta { font-size: 10px; color: #555566; margin-top: 2px; }

  /* Quick filters */
  .quick-filters { display: flex; gap: 8px; }
  .qf { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); background: #16161e; color: #888898; font-size: 12px; cursor: pointer; }
  .qf:hover { background: #1e1e28; color: #fff; }
</style>
</head>
<body>

<!-- Nav Rail -->
<div class="rail">
  <div class="rail-icon active">⌂</div>
  <div class="rail-icon">📡</div>
  <div class="rail-icon">🎬</div>
  <div class="rail-icon">📺</div>
  <div class="rail-icon">🔖</div>
  <div class="rail-divider"></div>
  <div class="rail-icon">⊞</div>
  <div class="rail-spacer"></div>
  <div class="rail-icon">⚙</div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <span style="color:#444455; font-size:11px;">Fractals</span>
    <span class="topbar-hint">/ to search &nbsp;·&nbsp; ⌘1–5 to switch view</span>
  </div>

  <div class="hero">
    <div class="hero-label">What do you want to watch?</div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" placeholder="Search movies, series, channels, actors…" />
      <span class="search-hint">/</span>
    </div>

    <div class="quick-filters">
      <div class="qf">All</div>
      <div class="qf">Live TV</div>
      <div class="qf">Movies</div>
      <div class="qf">Series</div>
    </div>

    <div class="recent-section">
      <div class="recent-label">Recently watched</div>
      <div class="recent-list">
        <div class="recent-item">
          <div class="recent-thumb" style="background:#1a2a1a;"></div>
          <div class="recent-info">
            <div class="recent-title">The Outsider</div>
            <div class="recent-meta">Series · S1 E4 · 62% watched</div>
          </div>
        </div>
        <div class="recent-item">
          <div class="recent-thumb" style="background:#2a1a1a;"></div>
          <div class="recent-info">
            <div class="recent-title">Titanic</div>
            <div class="recent-meta">Movie · 1h 47m remaining</div>
          </div>
        </div>
        <div class="recent-item">
          <div class="recent-thumb" style="background:#1a1a2a;"></div>
          <div class="recent-info">
            <div class="recent-title">Good Girls</div>
            <div class="recent-meta">Series · S2 E1</div>
          </div>
        </div>
        <div class="recent-item">
          <div class="recent-thumb" style="background:#2a2a1a;"></div>
          <div class="recent-info">
            <div class="recent-title">CNN International</div>
            <div class="recent-meta">Live · OPPLEX</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
