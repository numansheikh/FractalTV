<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — Resume Prompt</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { width: 100%; height: 100%; overflow: hidden; }

  .player-viewport {
    position: fixed;
    inset: 0;
    background: var(--bg-0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.3;
  }

  .video-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ── Top bar (same as VOD) ── */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(8, 8, 12, 0.8);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
  }

  .back-btn {
    font-size: 13px;
    color: var(--text-1);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    flex-shrink: 0;
  }

  .title {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-0);
  }

  .source-label {
    font-size: 11px;
    color: var(--text-2);
    flex-shrink: 0;
  }

  /* ── Resume card ── */
  .resume-overlay {
    position: fixed;
    bottom: 64px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
  }

  .resume-card {
    width: 380px;
    background: var(--bg-2);
    border: var(--border-default);
    border-radius: var(--radius-lg);
    padding: 16px;
  }

  .resume-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-0);
    margin-bottom: 4px;
  }

  .resume-meta {
    font-size: 11px;
    color: var(--text-2);
    margin-bottom: 14px;
  }

  .resume-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .btn-resume {
    flex: 1;
    height: 36px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--accent-interactive);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
  }

  .btn-start-over {
    flex: 1;
    height: 36px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--bg-3);
    color: var(--text-1);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
  }

  .auto-resume {
    font-size: 10px;
    color: var(--text-2);
    text-align: center;
  }
</style>
</head>
<body>
<div class="player-viewport">
  <div class="video-area">
    <img src="https://placehold.co/1440x810/0a0a14/1e1e28?text=Video+Playing" alt="Video paused">
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back-btn">&#8592; Back</button>
    <div class="title">The Dark Knight</div>
    <span class="source-label">MyIPTV</span>
  </div>

  <!-- Resume prompt -->
  <div class="resume-overlay">
    <div class="resume-card">
      <div class="resume-title">Resume from 1:23:45?</div>
      <div class="resume-meta">The Dark Knight &middot; 65% watched</div>
      <div class="resume-buttons">
        <button class="btn-resume">Resume</button>
        <button class="btn-start-over">Start Over</button>
      </div>
      <div class="auto-resume">Auto-resuming in 5s...</div>
    </div>
  </div>
</div>
</body>
</html>
