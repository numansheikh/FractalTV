<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractals — Browse Movies (Action)</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  .app { display: flex; height: 100vh; }

  /* ── Nav Rail ── */
  .nav-rail {
    width: 48px; flex-shrink: 0;
    background: var(--bg-1);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; align-items: center;
    padding: var(--space-6) 0;
    gap: var(--space-5);
  }
  .nav-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    border-radius: var(--radius-md);
    position: relative;
    cursor: pointer;
  }
  .nav-icon:hover { color: var(--text-1); }
  .nav-icon.active { color: var(--accent-film); }
  .nav-icon.active::before {
    content: '';
    position: absolute; left: -8px; top: 4px; bottom: 4px;
    width: 3px; border-radius: 0 2px 2px 0;
    background: var(--accent-film);
  }
  .nav-icon svg { width: 20px; height: 20px; }

  /* ── Main Area ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Command Bar ── */
  .command-bar {
    height: 44px; flex-shrink: 0;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 var(--space-6);
    gap: var(--space-5);
  }
  .cmd-dropdown {
    display: flex; align-items: center; gap: var(--space-2);
    font-size: 12px; font-weight: 500; color: var(--text-0);
    background: var(--bg-3);
    padding: var(--space-2) var(--space-4);
    border-radius: var(--radius-sm);
    cursor: pointer;
    border: 1px solid var(--border-default);
  }
  .cmd-dropdown.highlighted {
    background: rgba(59,130,246,0.15);
    border-color: rgba(59,130,246,0.3);
    color: var(--accent-film);
  }
  .cmd-dropdown .chevron { font-size: 10px; color: var(--text-2); }
  .cmd-search {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: var(--space-2) var(--space-4);
    color: var(--text-2);
    font-size: 12px;
    font-family: var(--font-ui);
    outline: none;
    min-width: 180px;
  }
  .cmd-search::placeholder { color: var(--text-3); }
  .cmd-sort {
    font-size: 11px; color: var(--text-1);
    display: flex; align-items: center; gap: var(--space-2);
    cursor: pointer;
  }
  .cmd-sort .chevron { font-size: 9px; color: var(--text-2); }
  .source-dots { display: flex; gap: 4px; align-items: center; margin-left: auto; }
  .source-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Filter Bar ── */
  .filter-bar {
    height: 32px; flex-shrink: 0;
    background: var(--bg-0);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 var(--space-6);
    gap: var(--space-4);
  }
  .pill {
    display: inline-flex; align-items: center; gap: var(--space-2);
    font-size: 11px; font-weight: 500;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    cursor: pointer;
    white-space: nowrap;
  }
  .pill .x { font-size: 10px; opacity: 0.6; }
  .pill-film { background: rgba(59,130,246,0.2); color: var(--accent-film); }
  .pill-cat { background: var(--bg-3); color: var(--text-1); }
  .filter-count {
    margin-left: auto;
    font-size: 11px; color: var(--text-2);
    font-family: var(--font-mono);
  }

  /* ── Content Grid ── */
  .content-area {
    flex: 1; overflow-y: auto;
    padding: var(--space-5);
  }
  .poster-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .poster-card {
    position: relative;
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
    background: var(--bg-2);
  }
  .poster-card:hover { outline: 1px solid var(--border-strong); }
  .poster-img {
    width: 100%; aspect-ratio: 2/3;
    display: block;
    object-fit: cover;
  }
  .poster-info {
    padding: var(--space-2) var(--space-3);
  }
  .poster-title {
    font-size: 11px; font-weight: 600; color: var(--text-0);
    line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .poster-meta {
    font-size: 10px; color: var(--text-2);
    margin-top: 1px;
    display: flex; align-items: center; gap: var(--space-2);
  }
  .poster-meta .star { color: var(--accent-warning); }
  .src-dot {
    position: absolute; top: 5px; right: 5px;
    width: 6px; height: 6px; border-radius: 50%;
  }

  /* poster gradient placeholders */
  .grad-1 { background: linear-gradient(135deg, #1a1a3e, #2d1b4e); }
  .grad-2 { background: linear-gradient(135deg, #1b2838, #0f3460); }
  .grad-3 { background: linear-gradient(135deg, #2b1a1a, #4a1942); }
  .grad-4 { background: linear-gradient(135deg, #0d2137, #1a3a2a); }
  .grad-5 { background: linear-gradient(135deg, #2a1f0f, #3d2b1f); }
  .grad-6 { background: linear-gradient(135deg, #1f0f2a, #2f1f3a); }
  .grad-7 { background: linear-gradient(135deg, #0f1f2a, #1a2a3f); }
  .grad-8 { background: linear-gradient(135deg, #2a0f1a, #3f1a2a); }
</style>
</head>
<body>
<div class="app">

  <!-- Nav Rail -->
  <nav class="nav-rail">
    <div class="nav-icon" title="Home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>
    </div>
    <div class="nav-icon" title="Live TV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 010 8.49m-8.48-.01a6 6 0 010-8.49m11.31-2.82a10 10 0 010 14.14m-14.14 0a10 10 0 010-14.14"/></svg>
    </div>
    <div class="nav-icon active" title="Films">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
    </div>
    <div class="nav-icon" title="Series">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
    </div>
    <div class="nav-icon" style="margin-top:auto" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main">

    <!-- Command Bar -->
    <div class="command-bar">
      <div class="cmd-dropdown highlighted">Action Movies <span class="chevron">&#9662;</span></div>
      <input class="cmd-search" type="text" placeholder="Search movies...">
      <div class="cmd-sort">Top Rated <span class="chevron">&#9662;</span></div>
      <div class="source-dots">
        <span class="source-dot" style="background:var(--src-1)"></span>
        <span class="source-dot" style="background:var(--src-2)"></span>
        <span class="source-dot" style="background:var(--src-3)"></span>
        <span class="source-dot" style="background:var(--src-4)"></span>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <span class="pill pill-film"><span class="x">&#10005;</span> Films</span>
      <span class="pill pill-cat"><span class="x">&#10005;</span> Action Movies</span>
      <span class="filter-count">Showing 847 movies</span>
    </div>

    <!-- Content Grid -->
    <div class="content-area">
      <div class="poster-grid" id="grid"></div>
    </div>

  </div>
</div>

<!-- Static card grid (no JS — written out) -->
<script>
// We use a tiny inline script ONLY to avoid repeating 40 cards in raw HTML.
// This is purely a convenience for the mockup — no interactivity.
const movies = [
  ["The Dark Knight","2008","8.9","grad-1","--src-1"],
  ["Mad Max: Fury Road","2015","8.1","grad-2","--src-2"],
  ["John Wick","2014","7.4","grad-3","--src-3"],
  ["Gladiator","2000","8.5","grad-4","--src-1"],
  ["Die Hard","1988","8.2","grad-5","--src-4"],
  ["The Matrix","1999","8.7","grad-6","--src-2"],
  ["Terminator 2","1991","8.6","grad-7","--src-1"],
  ["Aliens","1986","8.4","grad-8","--src-3"],
  ["Kill Bill: Vol. 1","2003","8.2","grad-1","--src-2"],
  ["The Bourne Identity","2002","7.9","grad-3","--src-4"],
  ["Inception","2010","8.8","grad-2","--src-1"],
  ["Casino Royale","2006","8.0","grad-4","--src-3"],
  ["Lethal Weapon","1987","7.6","grad-5","--src-2"],
  ["Predator","1987","7.8","grad-6","--src-1"],
  ["Speed","1994","7.2","grad-7","--src-4"],
  ["The Raid","2011","7.6","grad-8","--src-3"],
  ["300","2006","7.6","grad-1","--src-2"],
  ["Top Gun: Maverick","2022","8.3","grad-2","--src-1"],
  ["Heat","1995","8.3","grad-3","--src-4"],
  ["Rambo: First Blood","1982","7.7","grad-4","--src-2"],
  ["The Expendables","2010","6.5","grad-5","--src-3"],
  ["Mission: Impossible","1996","7.1","grad-6","--src-1"],
  ["Edge of Tomorrow","2014","7.9","grad-7","--src-4"],
  ["Total Recall","1990","7.5","grad-8","--src-2"],
  ["RoboCop","1987","7.6","grad-1","--src-3"],
  ["The Rock","1996","7.4","grad-2","--src-1"],
  ["Point Break","1991","7.3","grad-3","--src-4"],
  ["Taken","2008","7.8","grad-4","--src-2"],
  ["Fury","2014","7.6","grad-5","--src-1"],
  ["Extraction","2020","6.7","grad-6","--src-3"],
  ["Nobody","2021","7.4","grad-7","--src-4"],
  ["Sicario","2015","7.6","grad-8","--src-2"],
  ["Black Hawk Down","2001","7.7","grad-1","--src-1"],
  ["The Equalizer","2014","7.2","grad-2","--src-3"],
  ["Atomic Blonde","2017","6.7","grad-3","--src-4"],
  ["Warrior","2011","8.2","grad-4","--src-2"],
  ["Ip Man","2008","8.1","grad-5","--src-1"],
  ["Crouching Tiger","2000","7.9","grad-6","--src-3"],
  ["The Transporter","2002","6.8","grad-7","--src-4"],
  ["Dredd","2012","7.1","grad-8","--src-2"],
];
const grid = document.getElementById('grid');
movies.forEach(([title, year, rating, grad, src]) => {
  grid.innerHTML += `
    <div class="poster-card">
      <div class="poster-img ${grad}"></div>
      <span class="src-dot" style="background:var(${src})"></span>
      <div class="poster-info">
        <div class="poster-title">${title}</div>
        <div class="poster-meta">${year} &middot; <span class="star">&#9733;</span>${rating}</div>
      </div>
    </div>`;
});
</script>
</body>
</html>
