<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — VOD Movie</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { width: 100%; height: 100%; overflow: hidden; }

  .player-viewport {
    position: fixed;
    inset: 0;
    background: var(--bg-0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ── Top bar ── */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(8, 8, 12, 0.8);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
  }

  .top-bar .back-btn {
    font-size: 13px;
    color: var(--text-1);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .top-bar .title {
    flex: 1;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-0);
  }

  .top-bar .source-label {
    font-size: 11px;
    color: var(--text-2);
    flex-shrink: 0;
    white-space: nowrap;
  }

  /* ── Bottom controls ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(8, 8, 12, 0.8);
    padding: 0 20px 14px;
    z-index: 10;
  }

  /* Progress scrubber */
  .scrubber {
    padding: 12px 0 6px;
  }

  .scrubber-track {
    position: relative;
    width: 100%;
    height: 4px;
    background: var(--bg-4);
    border-radius: 2px;
    cursor: pointer;
  }

  .scrubber-fill {
    position: absolute;
    top: 0;
    left: 0;
    width: 65%;
    height: 100%;
    background: var(--accent-interactive);
    border-radius: 2px;
  }

  .scrubber-thumb {
    position: absolute;
    top: 50%;
    left: 65%;
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  .scrubber-times {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .scrubber-times span {
    font-family: var(--font-mono);
    font-size: 11px;
  }

  .scrubber-times .current { color: var(--text-0); }
  .scrubber-times .total   { color: var(--text-2); }

  /* Control row */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    position: relative;
  }

  .playback-controls {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  /* Rewind / Forward icons */
  .skip-btn svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--text-1);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* Play/Pause circle */
  .play-pause {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--text-0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .play-pause .pause-bars {
    display: flex;
    gap: 3px;
  }

  .play-pause .pause-bar {
    width: 4px;
    height: 16px;
    background: var(--bg-0);
    border-radius: 1px;
  }

  /* Right side controls */
  .right-controls {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .volume-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .volume-group svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-1);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .volume-slider {
    width: 60px;
    height: 3px;
    background: var(--bg-4);
    border-radius: 2px;
    position: relative;
  }

  .volume-slider-fill {
    position: absolute;
    top: 0;
    left: 0;
    width: 70%;
    height: 100%;
    background: var(--text-1);
    border-radius: 2px;
  }

  .speed-label {
    font-size: 12px;
    color: var(--text-2);
    font-family: var(--font-mono);
  }

  .fullscreen-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-1);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<div class="player-viewport">
  <div class="video-area">
    <img src="https://placehold.co/1440x810/0a0a14/1e1e28?text=Video+Playing" alt="Video playing">
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back-btn">&#8592; Back</button>
    <div class="title">The Dark Knight</div>
    <span class="source-label">MyIPTV</span>
  </div>

  <!-- Bottom controls -->
  <div class="bottom-bar">
    <!-- Progress scrubber -->
    <div class="scrubber">
      <div class="scrubber-track">
        <div class="scrubber-fill"></div>
        <div class="scrubber-thumb"></div>
      </div>
      <div class="scrubber-times">
        <span class="current">1:38:24</span>
        <span class="total">2:32:00</span>
      </div>
    </div>

    <!-- Control buttons -->
    <div class="controls-row">
      <div class="playback-controls">
        <!-- Rewind 10s -->
        <button class="ctrl-btn skip-btn" title="Rewind 10s">
          <svg viewBox="0 0 24 24">
            <path d="M12.5 8V4L6 9l6.5 5v-4c3.58 0 6.5 2.92 6.5 6.5S16.08 23 12.5 23 6 20.08 6 16.5" />
            <text x="10" y="15" fill="var(--text-1)" stroke="none" font-size="7" font-weight="700" font-family="var(--font-ui)" text-anchor="middle">10</text>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button class="ctrl-btn play-pause" title="Pause">
          <div class="pause-bars">
            <div class="pause-bar"></div>
            <div class="pause-bar"></div>
          </div>
        </button>

        <!-- Forward 10s -->
        <button class="ctrl-btn skip-btn" title="Forward 10s">
          <svg viewBox="0 0 24 24">
            <path d="M11.5 8V4L18 9l-6.5 5v-4C7.92 10 5 12.92 5 16.5S7.92 23 11.5 23 18 20.08 18 16.5" />
            <text x="14" y="15" fill="var(--text-1)" stroke="none" font-size="7" font-weight="700" font-family="var(--font-ui)" text-anchor="middle">10</text>
          </svg>
        </button>
      </div>

      <!-- Right side -->
      <div class="right-controls">
        <div class="volume-group">
          <svg viewBox="0 0 24 24">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="var(--text-1)" stroke="none"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
            <path d="M19.07 4.93a10 10 0 010 14.14"/>
          </svg>
          <div class="volume-slider">
            <div class="volume-slider-fill"></div>
          </div>
        </div>
        <span class="speed-label">1x</span>
        <button class="ctrl-btn fullscreen-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24">
            <polyline points="15 3 21 3 21 9"/>
            <polyline points="9 21 3 21 3 15"/>
            <line x1="21" y1="3" x2="14" y2="10"/>
            <line x1="3" y1="21" x2="10" y2="14"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
