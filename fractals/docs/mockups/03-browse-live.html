<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Fractals — Browse Live TV</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  /* === NAV RAIL === */
  .rail {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 48px;
    background: var(--bg-1);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0;
    z-index: 100;
    gap: 4px;
  }
  .rail-btn {
    position: relative;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-md);
    color: var(--text-2);
    cursor: pointer;
  }
  .rail-btn svg { width: 18px; height: 18px; }
  .rail-btn.active-live { color: var(--accent-live); }
  .rail-btn.active-live::before {
    content: '';
    position: absolute; left: -6px; top: 8px; bottom: 8px;
    width: 3px; border-radius: 0 2px 2px 0;
    background: var(--accent-live);
  }
  .rail-divider {
    width: 24px; height: 1px;
    background: var(--border-default);
    margin: 8px 0;
  }
  .rail-spacer { flex: 1; }

  /* === COMMAND BAR === */
  .command-bar {
    position: fixed; top: 0; left: 48px; right: 0;
    height: 44px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 90;
  }
  .cmd-dropdown {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-default);
    background: var(--bg-2);
    color: var(--text-1);
    font-size: 11px;
    white-space: nowrap;
    cursor: pointer;
  }
  .cmd-dropdown svg { width: 10px; height: 10px; opacity: 0.5; }
  .search-input {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    height: 30px;
    border-radius: var(--radius-full);
    background: var(--bg-2);
    border: 1px solid var(--border-default);
    color: var(--text-1);
    font-size: 12px;
  }
  .search-input svg { width: 14px; height: 14px; color: var(--text-2); flex-shrink: 0; }
  .search-input span { color: var(--text-2); }
  .source-dots {
    display: flex; gap: 6px; align-items: center;
    margin-left: 4px;
  }
  .source-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .source-dot.ring {
    background: transparent !important;
    box-shadow: inset 0 0 0 1.5px var(--bg-4);
  }

  /* === FILTER BAR === */
  .filter-bar {
    position: fixed; top: 44px; left: 48px; right: 0;
    height: 32px;
    background: var(--bg-0);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 80;
  }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px;
    border-radius: var(--radius-full);
    background: rgba(244, 63, 94, 0.15);
    color: var(--accent-live);
    font-size: 11px;
    font-weight: 500;
  }
  .filter-pill-x {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: rgba(244, 63, 94, 0.25);
    font-size: 10px;
    line-height: 1;
    cursor: pointer;
  }
  .filter-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-2);
  }

  /* === CONTENT AREA === */
  .content-area {
    position: fixed; top: 76px; left: 48px; right: 0; bottom: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
  }

  /* === CHANNEL GRID === */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .ch-card {
    border-radius: var(--radius-md);
    overflow: hidden;
    background: var(--bg-2);
    border: 1px solid var(--border-subtle);
    position: relative;
  }
  .ch-stripe { height: 2px; }
  .ch-logo {
    width: 100%; height: 90px;
    object-fit: contain; display: block;
    padding: 10px;
  }
  .ch-info {
    padding: 0 8px 8px;
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 4px;
  }
  .ch-name {
    font-size: 11px; font-weight: 500;
    color: var(--text-1);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
  }
  .ch-heart {
    flex-shrink: 0;
    color: var(--accent-live);
    font-size: 11px;
    margin-top: 1px;
  }
</style>
</head>
<body>

<!-- NAV RAIL -->
<nav class="rail">
  <div class="rail-btn" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/></svg>
  </div>
  <div class="rail-btn active-live" title="Live">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12L7 2"/><path d="M7 12l5-10"/><path d="M12 12l5-10"/><path d="M17 12l5-10"/><path d="M4.5 7h15"/><path d="M12 16v6"/><path d="M8 22h8"/></svg>
  </div>
  <div class="rail-btn" title="Films">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11v8a2 2 0 002 2h12a2 2 0 002-2v-8H4z"/><path d="M4 11l2-6h12l2 6"/><path d="M12 5l-1 6"/><path d="M8 5l-1 6"/><path d="M16 5l1 6"/></svg>
  </div>
  <div class="rail-btn" title="Series">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
  </div>
  <div class="rail-btn" title="Library">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
  </div>
  <div class="rail-divider"></div>
  <div class="rail-btn" title="Sources">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>
  </div>
  <div class="rail-spacer"></div>
  <div class="rail-btn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </div>
</nav>

<!-- COMMAND BAR -->
<header class="command-bar">
  <div class="cmd-dropdown">
    All categories
    <svg viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>
  <div class="search-input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <span>Search movies, channels, actors...</span>
  </div>
  <div class="cmd-dropdown">
    Latest
    <svg viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>
  <div class="source-dots">
    <div class="source-dot" style="background:var(--src-1)"></div>
    <div class="source-dot" style="background:var(--src-2)"></div>
    <div class="source-dot ring" style="box-shadow:inset 0 0 0 1.5px var(--src-3)"></div>
    <div class="source-dot ring" style="box-shadow:inset 0 0 0 1.5px var(--src-4)"></div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-pill">
    <span class="filter-pill-x">&times;</span>
    Live TV
  </div>
  <span class="filter-count">Showing 5,234 channels</span>
</div>

<!-- CONTENT AREA -->
<main class="content-area">
  <div class="channel-grid" id="grid"></div>
</main>

<script>
const channels = [
  {n:"ESPN",bg:"1a2a3e",fg:"3b82f6",s:1},
  {n:"BBC One",bg:"1a1a2e",fg:"a78bfa",s:1},
  {n:"Sky Sports 1",bg:"1e2a1a",fg:"10b981",s:2},
  {n:"CNN International",bg:"3e1a1a",fg:"f43f5e",s:1,fav:true},
  {n:"Al Jazeera",bg:"2a2a1a",fg:"fbbf24",s:2},
  {n:"Fox News",bg:"2a1a1a",fg:"f97316",s:1},
  {n:"Discovery Channel",bg:"1a2a2a",fg:"22c55e",s:2},
  {n:"MTV",bg:"2a1a3e",fg:"e879f9",s:1,fav:true},
  {n:"Cartoon Network",bg:"2a2a3e",fg:"fbbf24",s:1},
  {n:"HBO",bg:"1a1a3e",fg:"8b5cf6",s:2},
  {n:"Showtime",bg:"3e1a2a",fg:"f43f5e",s:1},
  {n:"DAZN",bg:"16161e",fg:"3b82f6",s:2},
  {n:"beIN Sports 1",bg:"1e1e28",fg:"10b981",s:1,fav:true},
  {n:"Eurosport",bg:"1a3e2a",fg:"22c55e",s:2},
  {n:"Sky News",bg:"1e1a2e",fg:"a78bfa",s:1},
  {n:"NBC Sports",bg:"2a1e1a",fg:"f97316",s:2},
  {n:"TNT",bg:"1a1e2a",fg:"3b82f6",s:1},
  {n:"National Geographic",bg:"2a2e1a",fg:"fbbf24",s:2,fav:true},
  {n:"Comedy Central",bg:"3e1e1a",fg:"f97316",s:1},
  {n:"BBC Two",bg:"1e1a1a",fg:"f43f5e",s:1},
  {n:"ITV",bg:"1a1e1a",fg:"10b981",s:2},
  {n:"Channel 4",bg:"2e1a2a",fg:"e879f9",s:1},
  {n:"RTL",bg:"1a2e2a",fg:"22c55e",s:2},
  {n:"TF1",bg:"2e1a1a",fg:"f43f5e",s:1},
  {n:"ZDF",bg:"1a2a1e",fg:"fbbf24",s:2},
  {n:"France 24",bg:"1e2a2a",fg:"3b82f6",s:1,fav:true},
  {n:"RAI 1",bg:"2a1e2a",fg:"a78bfa",s:2},
  {n:"TV5 Monde",bg:"1a1a1e",fg:"8b5cf6",s:1},
  {n:"Star Sports",bg:"2a1a1e",fg:"f97316",s:2},
  {n:"Sony Ten 1",bg:"1e2a1e",fg:"10b981",s:1},
];
const srcColors = ['var(--src-1)','var(--src-2)'];
const grid = document.getElementById('grid');
channels.forEach(ch => {
  const heart = ch.fav ? '<span class="ch-heart">&#9829;</span>' : '';
  grid.innerHTML += `
    <div class="ch-card">
      <div class="ch-stripe" style="background:${srcColors[ch.s-1]}"></div>
      <img class="ch-logo" src="https://placehold.co/160x90/${ch.bg}/${ch.fg}?text=${encodeURIComponent(ch.n)}" alt="">
      <div class="ch-info">
        <div class="ch-name">${ch.n}</div>
        ${heart}
      </div>
    </div>`;
});
</script>

</body>
</html>
