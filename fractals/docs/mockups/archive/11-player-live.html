<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — Live TV</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { width: 100%; height: 100%; overflow: hidden; }

  .player-viewport {
    position: fixed;
    inset: 0;
    background: var(--bg-0);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-area {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* ── Top bar ── */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(8, 8, 12, 0.8);
    display: flex;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
  }

  .back-btn {
    font-size: 13px;
    color: var(--text-1);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-ui);
    flex-shrink: 0;
  }

  .channel-info-top {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent-live);
    flex-shrink: 0;
  }

  .channel-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-0);
  }

  .live-badge {
    background: var(--accent-live);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 64px;
    background: rgba(8, 8, 12, 0.8);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 10;
  }

  .program-info {
    flex: 1;
    min-width: 0;
  }

  .program-title {
    font-size: 13px;
    color: var(--text-0);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .program-meta {
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
  }

  .center-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    margin: 0 32px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .volume-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .volume-group svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-1);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .volume-slider {
    width: 60px;
    height: 3px;
    background: var(--bg-4);
    border-radius: 2px;
    position: relative;
  }

  .volume-slider-fill {
    position: absolute;
    top: 0;
    left: 0;
    width: 70%;
    height: 100%;
    background: var(--text-1);
    border-radius: 2px;
  }

  .channel-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .ch-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-1);
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    font-family: var(--font-ui);
  }

  .ch-btn:hover {
    background: rgba(255,255,255,0.06);
  }

  .fullscreen-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text-1);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .right-controls {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="player-viewport">
  <div class="video-area">
    <img src="https://placehold.co/1440x810/0a0a14/1e1e28?text=Live+TV+Stream" alt="Live TV">
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <button class="back-btn">&#8592; Back</button>
    <div class="channel-info-top">
      <span class="live-dot"></span>
      <span class="channel-name">ESPN</span>
    </div>
    <span class="live-badge">LIVE</span>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="program-info">
      <div class="program-title">NBA: Lakers vs Celtics &mdash; Game 5</div>
      <div class="program-meta">Started 45m ago</div>
    </div>

    <div class="center-controls">
      <div class="volume-group">
        <svg viewBox="0 0 24 24">
          <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="var(--text-1)" stroke="none"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
          <path d="M19.07 4.93a10 10 0 010 14.14"/>
        </svg>
        <div class="volume-slider">
          <div class="volume-slider-fill"></div>
        </div>
      </div>

      <div class="channel-nav">
        <button class="ch-btn" title="Channel Up">&#9650;</button>
        <button class="ch-btn" title="Channel Down">&#9660;</button>
      </div>
    </div>

    <div class="right-controls">
      <button class="ctrl-btn fullscreen-btn" title="Fullscreen">
        <svg viewBox="0 0 24 24">
          <polyline points="15 3 21 3 21 9"/>
          <polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/>
          <line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>
</div>
</body>
</html>
