<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractals — UI v2 Mockup</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #13131f;
  --surface:      #1a1a28;
  --card:         #1e1e2e;
  --card-hover:   #262640;
  --border:       rgba(255,255,255,0.07);
  --border-mid:   rgba(255,255,255,0.12);
  --primary:      #7c4dff;
  --accent:       #b388ff;
  --text:         #e8e4ff;
  --text-sec:     #7870a4;
  --text-muted:   #3e3a56;

  --s0: #e06c75;  /* Opplex — rose */
  --s1: #61afef;  /* 4k Strong — sky blue */

  --live:   #e06c75;
  --movie:  #61afef;
  --series: #56b6c2;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
  font-size: 13px;
  user-select: none;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px 10px 80px; /* 80px left for macOS traffic lights */
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 48px;
}

/* macOS traffic lights simulation */
.traffic-lights {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 6px;
}
.tl { width: 12px; height: 12px; border-radius: 50%; }
.tl-close  { background: #ff5f57; }
.tl-min    { background: #febc2e; }
.tl-max    { background: #28c840; }

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-icon {
  width: 22px; height: 22px;
  background: var(--primary);
  clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
  opacity: 0.9;
}
.logo-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 13px;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  padding: 7px 12px 7px 34px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.search-input::placeholder { color: var(--text-muted); }
.search-input:focus { border-color: rgba(124,77,255,0.5); }

.header-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-sec);
  cursor: pointer;
  display: flex;align-items:center;justify-content:center;
  font-size: 16px;
  transition: background 0.1s, color 0.1s;
  flex-shrink: 0;
}
.header-btn:hover { background: var(--card); color: var(--text); }

/* ── TYPE TABS ──────────────────────────────────────────────────── */
.type-tabs {
  display: flex;
  align-items: center;
  gap: 0;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.type-tab {
  padding: 10px 18px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sec);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 0.1s, border-color 0.1s;
  white-space: nowrap;
}
.type-tab:hover { color: var(--text); }
.type-tab.active-live   { color: var(--live);   border-bottom-color: var(--live); }
.type-tab.active-movie  { color: var(--movie);  border-bottom-color: var(--movie); }
.type-tab.active-series { color: var(--series); border-bottom-color: var(--series); }

/* ── CATEGORY BAR ───────────────────────────────────────────────── */
.category-bar {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

/* filter input at the left — pinned to top */
.cat-filter-wrap {
  position: relative;
  flex-shrink: 0;
  align-self: flex-start;
  padding-top: 1px;
}
.cat-filter-icon {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-muted);
  pointer-events: none;
}
.cat-filter-input {
  background: var(--card);
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  padding: 4px 8px 4px 24px;
  font-size: 11px;
  color: var(--text);
  width: 140px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s, width 0.2s;
}
.cat-filter-input::placeholder { color: var(--text-muted); }
.cat-filter-input:focus {
  border-color: rgba(124,77,255,0.45);
  width: 180px;
}

.cat-divider {
  width: 1px;
  height: 20px;
  background: var(--border-mid);
  flex-shrink: 0;
  margin: 0 2px;
  align-self: flex-start;
  margin-top: 5px;
}

/* 2-row pill area */
.cat-pills-scroll {
  display: flex;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 5px;
  flex: 1;
  max-height: 70px;   /* ~2 rows of pills + gap */
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.cat-pills-scroll::-webkit-scrollbar { width: 3px; }
.cat-pills-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

.cat-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.12s;
  border: 1px solid transparent;
  color: var(--text-sec);
  background: transparent;
  flex-shrink: 0;
}
.cat-pill:hover {
  background: var(--card);
  color: var(--text);
}
.cat-pill.active {
  background: rgba(124,77,255,0.15);
  border-color: rgba(124,77,255,0.3);
  color: var(--accent);
}
.cat-pill .count {
  font-size: 10px;
  opacity: 0.55;
  font-family: 'JetBrains Mono', monospace;
}

/* source dots on category pill */
.cat-src-dots {
  display: flex;
  align-items: center;
  gap: 2px;
}
.cat-src-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── CONTENT AREA ───────────────────────────────────────────────── */
.content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

/* ── POSTER GRID (Movies / Series) ──────────────────────────────── */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
}

.poster-card {
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  background: var(--card);
}
.poster-card:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.poster-art {
  width: 100%;
  aspect-ratio: 2/3;
  position: relative;
  overflow: hidden;
}
.poster-art-inner {
  width: 100%; height: 100%;
}
.poster-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
}
.poster-source-dot {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid rgba(0,0,0,0.5);
}
.poster-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px 10px;
}
.poster-title {
  font-size: 11.5px;
  font-weight: 600;
  color: #fff;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.poster-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 3px;
}
.poster-year {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
}
.poster-rating {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  color: #e5c07b;
}

/* ── CHANNEL LIST (Live TV) ─────────────────────────────────────── */
.channel-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.channel-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
  overflow: hidden;
}
.channel-row:hover { background: var(--card-hover); }
.channel-row::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.channel-row:hover::before { opacity: 1; }

.channel-logo {
  width: 40px; height: 40px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -0.03em;
  color: rgba(255,255,255,0.9);
}
.channel-info { flex: 1; min-width: 0; }
.channel-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.channel-program {
  font-size: 11px;
  color: var(--text-sec);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.epg-bar {
  height: 2px;
  background: rgba(255,255,255,0.08);
  border-radius: 1px;
  margin-top: 5px;
  overflow: hidden;
}
.epg-progress {
  height: 100%;
  border-radius: 1px;
  opacity: 0.8;
}
.channel-badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
  flex-shrink: 0;
}

/* ── SOURCE TAB BAR ─────────────────────────────────────────────── */
.source-bar {
  display: flex;
  align-items: stretch;
  gap: 2px;
  padding: 6px 12px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 46px;
}

.source-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
  border: 1px solid transparent;
}
.source-tab:hover { background: var(--card); }
.source-tab.active {
  border-color: var(--border-mid);
}

.source-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.source-name {
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
.source-count {
  font-size: 10px;
  color: var(--text-muted);
  font-family: monospace;
}

/* Hover actions on source tab */
.source-actions {
  display: none;
  align-items: center;
  gap: 1px;
  margin-left: 4px;
}
.source-tab:hover .source-actions { display: flex; }
.source-tab:hover .source-count    { display: none; }

.src-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: background 0.1s, color 0.1s;
}
.src-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-sec); }
.src-btn.danger:hover { background: rgba(224,108,117,0.15); color: #e06c75; }

.source-tab-add {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px dashed var(--border-mid);
  color: var(--text-muted);
  font-size: 12px;
  transition: all 0.12s;
  margin-left: 4px;
}
.source-tab-add:hover {
  background: var(--card);
  color: var(--text-sec);
  border-style: solid;
}

.source-spacer { flex: 1; }

/* source tab 'all' */
.source-tab-all .source-name { color: var(--text-sec); }
.source-tab-all.active .source-name { color: var(--accent); }
.source-tab-all.active { border-color: rgba(179,136,255,0.25); background: rgba(124,77,255,0.08); }

/* syncing animation */
@keyframes spin { to { transform: rotate(360deg); } }
.syncing { animation: spin 1s linear infinite; display: inline-block; }

/* ── POSTER ART GRADIENTS ───────────────────────────────────────── */
/* Each fake poster gets one of these palettes */
.pa-0  { background: linear-gradient(145deg, #1a0a2e 0%, #6b21a8 50%, #e040fb 100%); }
.pa-1  { background: linear-gradient(145deg, #0f1729 0%, #1e3a5f 50%, #2196f3 100%); }
.pa-2  { background: linear-gradient(145deg, #1a0a0a 0%, #7f1d1d 50%, #ef4444 100%); }
.pa-3  { background: linear-gradient(145deg, #0a1a0f 0%, #14532d 50%, #22c55e 100%); }
.pa-4  { background: linear-gradient(145deg, #1a1200 0%, #78350f 50%, #f59e0b 100%); }
.pa-5  { background: linear-gradient(145deg, #0a1820 0%, #164e63 50%, #06b6d4 100%); }
.pa-6  { background: linear-gradient(145deg, #180a1a 0%, #701a75 50%, #d946ef 100%); }
.pa-7  { background: linear-gradient(145deg, #1a0f0a 0%, #7c2d12 50%, #f97316 100%); }
.pa-8  { background: linear-gradient(145deg, #0f1a1a 0%, #134e4a 50%, #14b8a6 100%); }
.pa-9  { background: linear-gradient(145deg, #12121a 0%, #312e81 50%, #818cf8 100%); }
.pa-10 { background: linear-gradient(145deg, #1a0a14 0%, #9d174d 50%, #ec4899 100%); }
.pa-11 { background: linear-gradient(145deg, #0a150f 0%, #166534 50%, #4ade80 100%); }

/* channel logo bg variants */
.cl-0 { background: rgba(224,108,117,0.2); color: #e06c75; }
.cl-1 { background: rgba(97,175,239,0.2);  color: #61afef; }
.cl-2 { background: rgba(86,182,194,0.2);  color: #56b6c2; }
.cl-3 { background: rgba(229,192,123,0.2); color: #e5c07b; }
.cl-4 { background: rgba(198,120,221,0.2); color: #c678dd; }
.cl-5 { background: rgba(152,195,121,0.2); color: #98c379; }

/* active tab "all" styling */
.tab-all-active { color: var(--text); font-weight: 600; }

/* Section header in list */
.section-hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 4px 8px;
}
.section-hdr-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
}

/* ── LIGHT THEME ───────────────────────────────────────────────── */
body.light {
  --bg:           #f4f3f9;
  --surface:      #ffffff;
  --card:         #f0eff7;
  --card-hover:   #e8e7f4;
  --border:       rgba(0,0,0,0.08);
  --border-mid:   rgba(0,0,0,0.13);
  --primary:      #7c4dff;
  --accent:       #6030cc;
  --text:         #1a1830;
  --text-sec:     #5c5880;
  --text-muted:   #a09cc0;
  --live:   #c0392b;
  --movie:  #2471a3;
  --series: #148f77;
}
body.light .search-input,
body.light .cat-filter-input {
  background: #ebe9f5;
  color: #1a1830;
}
body.light .poster-title { color: #fff; } /* still on dark poster art */
body.light .poster-year  { color: rgba(255,255,255,0.6); }
body.light .channel-row:hover { background: var(--card-hover); }

/* theme toggle btn */
.theme-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border-mid);
  background: var(--card);
  color: var(--text-sec);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: background 0.1s;
  flex-shrink: 0;
}
.theme-btn:hover { background: var(--card-hover); color: var(--text); }

/* ── STATUS INDICATOR ──────────────────────────────────────────── */
/* Status indicator */
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-ok      { background: #98c379; }
.status-syncing { background: #e5c07b; animation: pulse 1.2s ease-in-out infinite; }
.status-error   { background: #e06c75; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* LIVE badge */
.live-badge {
  display: flex; align-items: center; gap: 3px;
  background: rgba(224,108,117,0.15);
  color: #e06c75;
  border: 1px solid rgba(224,108,117,0.25);
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.live-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #e06c75;
  animation: pulse 1.2s ease-in-out infinite;
}

/* Note box at bottom for iteration */
.note {
  position: fixed;
  bottom: 52px;
  right: 12px;
  background: rgba(229,192,123,0.12);
  border: 1px solid rgba(229,192,123,0.25);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 11px;
  color: #e5c07b;
  max-width: 220px;
  z-index: 100;
  line-height: 1.6;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────── -->
<div class="header" style="position:relative;">
  <div class="traffic-lights">
    <div class="tl tl-close"></div>
    <div class="tl tl-min"></div>
    <div class="tl tl-max"></div>
  </div>

  <div class="logo">
    <div class="logo-icon"></div>
    <span class="logo-text">Fractals</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" type="text" placeholder="Search channels, movies, actors, directors…">
  </div>

  <button class="theme-btn" title="Toggle light/dark" onclick="toggleTheme()" id="theme-toggle">☀</button>
  <button class="header-btn" title="Settings (⌘,)">⚙</button>
</div>

<!-- ── TYPE TABS ──────────────────────────────────────────────────── -->
<div class="type-tabs">
  <div class="type-tab" onclick="switchType('live')"   id="tab-live">Live TV</div>
  <div class="type-tab active-movie" onclick="switchType('movie')"  id="tab-movie">Movies</div>
  <div class="type-tab" onclick="switchType('series')" id="tab-series">Series</div>
</div>

<!-- ── CATEGORY BAR ────────────────────────────────────────────────── -->
<div class="category-bar" id="category-bar-wrap">
  <div class="cat-filter-wrap">
    <span class="cat-filter-icon">⌕</span>
    <input class="cat-filter-input" type="text" placeholder="Filter categories…"
      id="cat-filter" oninput="filterCategories(this.value)">
  </div>
  <div class="cat-divider"></div>
  <div class="cat-pills-scroll" id="category-bar">
    <!-- populated by JS -->
  </div>
</div>

<!-- ── CONTENT AREA ───────────────────────────────────────────────── -->
<div class="content-area" id="content-area">
  <!-- populated by JS -->
</div>

<!-- ── SOURCE TAB BAR ─────────────────────────────────────────────── -->
<div class="source-bar">
  <div class="source-tab source-tab-all active" id="src-all" onclick="switchSource('all')">
    <span class="source-name tab-all-active">All</span>
    <span class="source-count">303k</span>
  </div>

  <div class="source-tab" id="src-0" onclick="switchSource('0')"
    style="--dot-color: var(--s0)">
    <div class="status-dot status-ok"></div>
    <div class="source-dot" style="background:var(--s0)"></div>
    <span class="source-name" style="color:var(--s0)">Opplex</span>
    <span class="source-count">78,893</span>
    <div class="source-actions">
      <button class="src-btn" title="Sync" onclick="event.stopPropagation()">↻</button>
      <button class="src-btn" title="Disable" onclick="event.stopPropagation()">◉</button>
      <button class="src-btn danger" title="Delete" onclick="event.stopPropagation()">✕</button>
    </div>
  </div>

  <div class="source-tab" id="src-1" onclick="switchSource('1')"
    style="--dot-color: var(--s1)">
    <div class="status-dot status-syncing"></div>
    <div class="source-dot" style="background:var(--s1)"></div>
    <span class="source-name" style="color:var(--s1)">4k Strong</span>
    <span class="source-count">224,492</span>
    <div class="source-actions">
      <button class="src-btn syncing" title="Syncing…" onclick="event.stopPropagation()">↻</button>
      <button class="src-btn" title="Disable" onclick="event.stopPropagation()">◉</button>

let activeType = 'movie'
let activeCategory = 'all'
let activeSource = 'all'
const sourceColors = ['#e06c75', '#61afef']

// ── RENDER ────────────────────────────────────────────────────────────

function render() {
  renderCategories()
  renderContent()
}

let categoryFilter = ''

function renderCategories() {
  const bar = document.getElementById('category-bar')
  const cats = data[activeType].categories.filter(c =>
    !categoryFilter || c.label.toLowerCase().includes(categoryFilter.toLowerCase())
  )
  bar.innerHTML = cats.map(c => `
    <div class="cat-pill ${c.id === activeCategory ? 'active' : ''}"
      onclick="switchCategory('${c.id}')">
      <div class="cat-src-dots">
        ${c.srcs.map(s => `<div class="cat-src-dot" style="background:${sourceColors[s]}"></div>`).join('')}
      </div>
      ${c.label}
      <span class="count">${fmtNum(c.count)}</span>
    </div>
  `).join('')
  if (cats.length === 0) {
    bar.innerHTML = `<span style="font-size:11px;color:var(--text-muted);padding:0 4px">No categories match</span>`
  }
}

function filterCategories(val) {
  categoryFilter = val
  renderCategories()
}

function renderContent() {
  const area = document.getElementById('content-area')
  if (activeType === 'live') renderLive(area)
  else renderPosters(area)
}

function renderPosters(area) {
  const items = data[activeType].items
  area.innerHTML = `<div class="poster-grid">${items.map(item => `
    <div class="poster-card" onclick="">
      <div class="poster-art">
        <div class="poster-art-inner pa-${item.art}"></div>
        <div class="poster-overlay"></div>
        <div class="poster-source-dot"
          style="background:${sourceColors[item.src]}"></div>
        <div class="poster-info">
          <div class="poster-title">${item.title}</div>
          <div class="poster-meta">
            <span class="poster-year">${item.year}</span>
            ${item.rating ? `<span class="poster-rating">★ ${item.rating}</span>` : ''}
          </div>
        </div>
      </div>
    </div>
  `).join('')}</div>`
}

function renderLive(area) {
  const items = data.live.items
  area.innerHTML = `<div class="channel-list">${items.map(ch => `
    <div class="channel-row" style="--stripe: ${sourceColors[ch.src]}"
      onmouseenter="this.style.setProperty('--before-op','1')"
      onclick="">
      <style>
        .channel-row:hover::before { background: ${sourceColors[ch.src]}; opacity: 0.9 !important; }
      </style>
      <div class="channel-logo cl-${ch.cl}">
        ${ch.name.substring(0,3).toUpperCase()}
      </div>
      <div class="channel-info">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-program">${ch.program}</div>
        <div class="epg-bar">
          <div class="epg-progress" style="width:${ch.progress}%;background:${sourceColors[ch.src]}"></div>
        </div>
      </div>
      <div class="channel-badge" style="background:rgba(97,175,239,0.1);color:#61afef;border:1px solid rgba(97,175,239,0.2)">${ch.badge}</div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  `).join('')}</div>`
}

function fmtNum(n) {
  if (n >= 1000) return (n/1000).toFixed(0) + 'k'
  return n.toString()
}

// ── INTERACTIONS ──────────────────────────────────────────────────────

function switchType(type) {
  activeType = type
  activeCategory = 'all'
  // Update tab active class
  ;['live','movie','series'].forEach(t => {
    const el = document.getElementById(`tab-${t}`)
    el.className = t === type ? `type-tab active-${t}` : 'type-tab'
  })
  render()
}

function switchCategory(id) {
  activeCategory = id
  render()
}

function switchSource(id) {
  activeSource = id
  ;['all','0','1'].forEach(s => {
    const el = document.getElementById(`src-${s}`)
    if (el) el.classList.toggle('active', s === id)
  })
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light')
  document.getElementById('theme-toggle').textContent = isLight ? '☾' : '☀'
}
