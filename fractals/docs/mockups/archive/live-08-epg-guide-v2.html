*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-0: #08080c; --bg-1: #0e0e14; --bg-2: #16161e; --bg-3: #1e1e28; --bg-4: #282834;
  --border-subtle: rgba(255,255,255,0.06); --border-default: rgba(255,255,255,0.12); --border-strong: rgba(255,255,255,0.22);
  --text-0: #f5f3ff; --text-1: #c4bfe8; --text-2: #7a7590; --text-3: #4a4760;
  --accent-live: #f43f5e; --accent-interactive: #8b5cf6;
  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", monospace;
  --ch-col: 164px;
  --hour-px: 280px;
  --row-h: 52px;
  --header-h: 44px;
  --timebar-h: 32px;
}
body { font-family: var(--font-ui); background: #1a1a24; color: var(--text-0); height: 100vh; overflow: hidden; display: flex; align-items: flex-end; }

/* ── Simulated app behind the overlay ── */
.app-bg {
  position: fixed; inset: 0;
  display: flex;
  background: var(--bg-0);
}
.app-sidebar {
  width: 200px; background: var(--bg-1); border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; gap: 0;
}
.app-sidebar-item {
  padding: 10px 14px; font-size: 12px; color: var(--text-2); border-bottom: 1px solid var(--border-subtle);
}
.app-sidebar-item.active { color: var(--text-0); background: var(--bg-2); }
.app-video {
  flex: 1; background: #000; display: flex; align-items: center; justify-content: center;
  color: var(--text-3); font-size: 13px;
}

/* ── Sheet overlay ── */
.sheet-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(2px);
}
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  height: 72vh;
  background: var(--bg-1);
  border-top: 1px solid var(--border-default);
  border-radius: 14px 14px 0 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.6);
}

/* drag handle */
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.15);
  margin: 10px auto 0;
  flex-shrink: 0;
}

/* top bar */
.sheet-header {
  height: var(--header-h);
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.sheet-title { font-size: 13px; font-weight: 600; color: var(--text-0); }
.sheet-date { font-size: 11px; color: var(--text-2); font-family: var(--font-mono); }
.spacer { flex: 1; }
.nav-btn {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--bg-2); border: 1px solid var(--border-default);
  color: var(--text-1); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.nav-btn:hover { background: var(--bg-3); }
.now-btn {
  height: 28px; padding: 0 12px; border-radius: 7px;
  background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.25);
  color: var(--accent-live); font-size: 11px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-live); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.close-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-3); border: none;
  color: var(--text-2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-left: 4px;
}
.close-btn:hover { background: var(--bg-4); color: var(--text-0); }

/* ── Grid area ── */
.grid-wrap {
  flex: 1; display: flex; overflow: hidden;
}

/* left channel column */
.ch-col {
  width: var(--ch-col); flex-shrink: 0;
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.ch-col-header {
  height: var(--timebar-h); flex-shrink: 0;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; padding: 0 12px;
}
.ch-filter {
  width: 100%; background: var(--bg-2); border: 1px solid var(--border-default);
  border-radius: 5px; padding: 4px 8px; font-size: 11px;
  color: var(--text-0); outline: none; font-family: var(--font-ui);
}
.ch-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
.ch-list::-webkit-scrollbar { width: 3px; }
.ch-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.ch-row {
  height: var(--row-h); display: flex; align-items: center; gap: 8px;
  padding: 0 10px; border-bottom: 1px solid var(--border-subtle);
  cursor: pointer; transition: background 0.1s;
  flex-shrink: 0;
}
.ch-row:hover { background: var(--bg-2); }
.ch-row.active { background: rgba(139,92,246,0.1); }
.ch-logo {
  width: 28px; height: 28px; border-radius: 5px;
  object-fit: contain; flex-shrink: 0;
  background: var(--bg-3);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: var(--text-3); overflow: hidden;
}
.ch-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 5px; }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 11px; font-weight: 500; color: var(--text-0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-now { font-size: 10px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.src-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.fav-star { font-size: 10px; color: #fbbf24; flex-shrink: 0; }

/* right timeline */
.timeline-wrap {
  flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative;
}

/* time header */
.time-header {
  height: var(--timebar-h); flex-shrink: 0;
  border-bottom: 1px solid var(--border-subtle);
  position: relative; overflow: hidden;
}
.time-header-inner {
  position: absolute; top: 0; left: 0; height: 100%;
  width: calc(var(--hour-px) * 8); /* 8 hours displayed */
  display: flex;
}
.time-slot {
  width: var(--hour-px); flex-shrink: 0;
  display: flex; align-items: center; padding-left: 8px;
  font-size: 10px; color: var(--text-2); font-family: var(--font-mono);
  border-right: 1px solid var(--border-subtle);
}
.time-slot-half {
  position: absolute; top: 50%; height: 8px; width: 1px;
  background: var(--border-subtle);
  transform: translateY(-50%);
}

/* programme rows */
.prog-scroll {
  flex: 1; overflow: auto;
  position: relative;
}
.prog-scroll::-webkit-scrollbar { width: 3px; height: 4px; }
.prog-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.prog-row {
  height: var(--row-h); position: relative;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.prog-inner {
  position: absolute; top: 0; left: 0; height: 100%;
  width: calc(var(--hour-px) * 8);
}

/* programme block */
.prog {
  position: absolute; top: 4px; bottom: 4px;
  border-radius: 5px; padding: 0 8px;
  display: flex; flex-direction: column; justify-content: center;
  cursor: pointer; transition: filter 0.1s;
  overflow: hidden;
  border: 1px solid transparent;
}
.prog:hover { filter: brightness(1.2); border-color: rgba(255,255,255,0.15); }
.prog.current { border-color: rgba(255,255,255,0.25); }
.prog.past { opacity: 0.45; }
.prog-title { font-size: 11px; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-time { font-size: 9px; color: rgba(255,255,255,0.55); font-family: var(--font-mono); margin-top: 2px; white-space: nowrap; }

/* colour palette for channels */
.c1 { background: rgba(139,92,246,0.22); }
.c2 { background: rgba(59,130,246,0.22); }
.c3 { background: rgba(16,185,129,0.22); }
.c4 { background: rgba(245,158,11,0.22); }
.c5 { background: rgba(239,68,68,0.22); }
.c6 { background: rgba(236,72,153,0.22); }

/* now line */
.now-line {
  position: absolute; top: 0; bottom: 0;
  width: 2px; background: var(--accent-live);
  z-index: 10; pointer-events: none;
  box-shadow: 0 0 8px rgba(244,63,94,0.6);
}
.now-line::before {
  content: ''; position: absolute; top: -1px; left: -4px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent-live);
}

/* tooltip */
.tooltip {
  position: absolute; z-index: 50;
  background: var(--bg-0); border: 1px solid var(--border-default);
  border-radius: 8px; padding: 10px 12px;
  max-width: 240px; min-width: 180px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  pointer-events: none;
}
.tooltip-title { font-size: 12px; font-weight: 600; color: var(--text-0); margin-bottom: 4px; }
.tooltip-time { font-size: 10px; color: var(--text-2); font-family: var(--font-mono); margin-bottom: 6px; }
.tooltip-desc { font-size: 11px; color: var(--text-1); line-height: 1.5; }
</style>

const progRows = document.getElementById('progRows')
progData.forEach((progs, ci) => {
  const row = document.createElement('div')
  row.className = 'prog-row'
  const inner = document.createElement('div')
  inner.className = 'prog-inner'
  inner.style.width = (HOUR_PX * 8) + 'px'

  progs.forEach(p => {
    const left = (p.offset / 60) * HOUR_PX
    const width = (p.dur / 60) * HOUR_PX - 3
    if (left + width < 0 || left > HOUR_PX * 8) return

    const block = document.createElement('div')
    block.className = 'prog ' + colorClasses[ci % colorClasses.length]
    if (p.current) block.classList.add('current')
    if (p.offset + p.dur < (now - windowStart) / 60000) block.classList.add('past')
    block.style.left = left + 'px'
    block.style.width = width + 'px'

    const startT = new Date(windowStart.getTime() + p.offset * 60000)
    const endT = new Date(windowStart.getTime() + (p.offset + p.dur) * 60000)

    block.innerHTML = `
      <div class="prog-title">${p.title}</div>
      ${p.dur >= 30 ? `<div class="prog-time">${fmtTime(startT)} – ${fmtTime(endT)}</div>` : ''}
    `

    // Tooltip
    block.addEventListener('mouseenter', (e) => {
      const tt = document.getElementById('tooltip')
      document.getElementById('ttTitle').textContent = p.title
      document.getElementById('ttTime').textContent = fmtTime(startT) + ' – ' + fmtTime(endT) + ' · ' + p.dur + 'min'
      document.getElementById('ttDesc').textContent = p.desc || 'No description available.'
      const rect = block.getBoundingClientRect()
      tt.style.display = 'block'
      tt.style.top = (rect.top - 90) + 'px'
      tt.style.left = Math.min(rect.left, window.innerWidth - 260) + 'px'
    })
    block.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').style.display = 'none'
    })

    inner.appendChild(block)
  })

  row.appendChild(inner)
  progRows.appendChild(row)
})

// Now line
const nowOffsetMin = (now - windowStart) / 60000
const nowLeft = (nowOffsetMin / 60) * HOUR_PX
document.getElementById('nowLine').style.left = nowLeft + 'px'

// Scroll timeline to show now with some left context
const progScroll = document.getElementById('progScroll')
progScroll.scrollLeft = nowLeft - 120
document.querySelector('.time-header').scrollLeft = nowLeft - 120

// Sync scroll
progScroll.addEventListener('scroll', () => {
  document.querySelector('.time-header').scrollLeft = progScroll.scrollLeft
})
// Also sync ch-list vertical scroll with prog-rows
progScroll.addEventListener('scroll', () => {
  chList.scrollTop = progScroll.scrollTop
})
chList.addEventListener('scroll', () => {
  progScroll.scrollTop = chList.scrollTop
})
</script>
</body>
</html>
