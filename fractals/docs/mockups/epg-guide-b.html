<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractals — EPG Guide B · Click for detail panel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-0:#08080c; --bg-1:#0e0e14; --bg-2:#16161e; --bg-3:#1e1e28; --bg-4:#282834;
  --border-subtle:rgba(255,255,255,0.06); --border-default:rgba(255,255,255,0.12);
  --text-0:#f5f3ff; --text-1:#c4bfe8; --text-2:#7a7590; --text-3:#4a4760;
  --accent-live:#f43f5e; --accent-interactive:#8b5cf6;
  --font-ui:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"SF Mono","JetBrains Mono",monospace;
}
html,body { height:100%; font-family:var(--font-ui); background:var(--bg-0); color:var(--text-0); overflow:hidden; }

/* ── LiveSplitView (behind) ── */
.split { display:flex; height:100vh; }
.split-left {
  width:240px; flex-shrink:0; background:var(--bg-1);
  border-right:1px solid var(--border-subtle); display:flex; flex-direction:column;
}
.split-left-header { padding:10px 12px 8px; border-bottom:1px solid var(--border-subtle); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2); }
.split-left-filter { margin:8px 10px; background:var(--bg-2); border:1px solid var(--border-default); border-radius:6px; padding:6px 10px; font-size:11px; color:var(--text-0); outline:none; font-family:var(--font-ui); width:calc(100% - 20px); }
.ch-item { display:flex; align-items:center; gap:8px; padding:7px 12px; border-bottom:1px solid var(--border-subtle); cursor:pointer; transition:background .1s; }
.ch-item:hover { background:var(--bg-2); }
.ch-item.active { background:rgba(139,92,246,.12); border-left:2px solid var(--accent-interactive); padding-left:10px; }
.ch-logo-sm { width:26px; height:26px; border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
.ch-title-sm { font-size:11px; font-weight:500; color:var(--text-0); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
.src-dot-sm { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

.split-right { flex:1; display:flex; flex-direction:column; background:#000; }
.split-top-bar { height:42px; background:rgba(0,0,0,.7); border-bottom:1px solid var(--border-subtle); display:flex; align-items:center; gap:10px; padding:0 14px; flex-shrink:0; }
.split-channel-name { font-size:13px; font-weight:600; color:var(--text-0); }
.live-badge { padding:2px 7px; border-radius:4px; font-size:9px; font-weight:700; letter-spacing:.07em; background:var(--accent-live); color:#fff; }
.split-spacer { flex:1; }
.icon-btn { width:28px; height:28px; border-radius:7px; background:rgba(255,255,255,.08); border:1px solid var(--border-subtle); color:var(--text-1); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; }
.video-area { flex:1; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#0d1117,#1a0a2e); position:relative; }
.video-placeholder { font-size:14px; color:rgba(255,255,255,.2); letter-spacing:.05em; text-transform:uppercase; }

.epg-strip { background:rgba(10,8,20,.92); border-top:1px solid var(--border-subtle); padding:10px 14px 12px; flex-shrink:0; backdrop-filter:blur(10px); }
.epg-row-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.epg-logo { width:30px; height:30px; border-radius:6px; flex-shrink:0; background:rgba(139,92,246,.2); border:1px solid rgba(139,92,246,.3); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:#8b5cf6; }
.epg-now-label { font-size:9px; font-weight:700; letter-spacing:.07em; color:var(--accent-live); text-transform:uppercase; flex-shrink:0; }
.epg-prog-name { font-size:13px; font-weight:600; color:var(--text-0); flex:1; }
.epg-time { font-size:10px; color:var(--text-2); font-family:var(--font-mono); flex-shrink:0; }
.epg-guide-btn { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; background:rgba(139,92,246,.15); border:1px solid rgba(139,92,246,.3); color:#a78bfa; font-size:10px; font-weight:600; cursor:pointer; flex-shrink:0; transition:background .1s; }
.epg-guide-btn:hover { background:rgba(139,92,246,.25); }
.epg-guide-btn svg { width:11px; height:11px; }
.epg-progress-track { height:2px; background:rgba(255,255,255,.08); border-radius:1px; margin:6px 0; }
.epg-progress-fill { height:100%; border-radius:1px; background:var(--accent-live); }
.epg-next-row { display:flex; align-items:center; gap:6px; }
.epg-next-label { font-size:9px; font-weight:600; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; }
.epg-next-name { font-size:11px; color:var(--text-2); }
.epg-next-time { font-size:10px; color:var(--text-3); font-family:var(--font-mono); margin-left:auto; }

/* ── Backdrop ── */
.backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(3px); z-index:40; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── Sheet ── */
.sheet {
  position:fixed; left:0; right:0; bottom:0; height:73vh;
  background:var(--bg-1); border-top:1px solid var(--border-default);
  border-radius:14px 14px 0 0; display:flex; flex-direction:column;
  overflow:hidden; z-index:50; box-shadow:0 -12px 48px rgba(0,0,0,.7);
  animation:slideUp .22s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,.12); margin:10px auto 0; flex-shrink:0; }
.sheet-header { height:44px; display:flex; align-items:center; gap:10px; padding:0 16px; border-bottom:1px solid var(--border-subtle); flex-shrink:0; }
.sheet-title { font-size:13px; font-weight:700; color:var(--text-0); }
.sheet-date { font-size:11px; color:var(--text-2); font-family:var(--font-mono); }
.spacer { flex:1; }
.nav-btn { width:28px; height:28px; border-radius:7px; background:var(--bg-2); border:1px solid var(--border-default); color:var(--text-1); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.now-btn { height:28px; padding:0 10px; border-radius:7px; background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.25); color:var(--accent-live); font-size:11px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; }
.live-dot { width:5px; height:5px; border-radius:50%; background:var(--accent-live); animation:pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.close-btn { width:28px; height:28px; border-radius:50%; background:var(--bg-3); border:none; color:var(--text-2); font-size:18px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* ── Main grid area ── */
.grid-outer { flex:1; display:flex; overflow:hidden; }

/* channel col */
.ch-col { width:168px; flex-shrink:0; border-right:1px solid var(--border-subtle); display:flex; flex-direction:column; }
.ch-col-hdr { height:30px; border-bottom:1px solid var(--border-subtle); flex-shrink:0; display:flex; align-items:center; padding:0 10px; }
.ch-col-filter { width:100%; background:transparent; border:none; outline:none; font-size:11px; color:var(--text-0); font-family:var(--font-ui); }
.ch-col-filter::placeholder { color:var(--text-3); }
.ch-list { flex:1; overflow-y:auto; }
.ch-list::-webkit-scrollbar { width:2px; }
.ch-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); }
.ch-row { height:50px; display:flex; align-items:center; gap:8px; padding:0 10px; border-bottom:1px solid var(--border-subtle); cursor:pointer; transition:background .1s; flex-shrink:0; }
.ch-row:hover { background:var(--bg-2); }
.ch-row.playing { background:rgba(139,92,246,.1); }
.ch-logo { width:28px; height:28px; border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
.ch-name { font-size:11px; font-weight:500; color:var(--text-0); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ch-now-prog { font-size:9px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }

/* timeline + detail side by side */
.timeline-and-detail { flex:1; display:flex; overflow:hidden; }

.timeline-col { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
.time-hdr { height:30px; border-bottom:1px solid var(--border-subtle); flex-shrink:0; overflow:hidden; position:relative; }
.time-hdr-inner { position:absolute; top:0; left:0; height:100%; display:flex; }
.time-slot { flex-shrink:0; display:flex; align-items:center; padding-left:8px; font-size:10px; color:var(--text-3); font-family:var(--font-mono); border-right:1px solid var(--border-subtle); position:relative; }
.half-mark { position:absolute; right:50%; top:40%; height:40%; width:1px; background:var(--border-subtle); }
.prog-scroll { flex:1; overflow:auto; position:relative; }
.prog-scroll::-webkit-scrollbar { width:3px; height:4px; }
.prog-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }
.prog-canvas { position:relative; }
.prog-row { height:50px; position:relative; border-bottom:1px solid var(--border-subtle); flex-shrink:0; }
.prog-row-inner { position:absolute; top:0; left:0; height:100%; }
.prog { position:absolute; top:4px; bottom:4px; border-radius:5px; padding:0 7px; display:flex; flex-direction:column; justify-content:center; cursor:pointer; overflow:hidden; border:1px solid transparent; transition:filter .12s, border-color .12s; }
.prog:hover { filter:brightness(1.25); border-color:rgba(255,255,255,.2); }
.prog.selected { border-color:rgba(255,255,255,.35)!important; filter:brightness(1.3); }
.prog.is-now { border-color:rgba(255,255,255,.2); }
.prog.is-past { opacity:.38; }
.prog-title { font-size:11px; font-weight:500; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prog-dur { font-size:9px; color:rgba(255,255,255,.5); font-family:var(--font-mono); margin-top:1px; white-space:nowrap; }
.now-line { position:absolute; top:0; bottom:0; width:2px; background:var(--accent-live); z-index:10; pointer-events:none; box-shadow:0 0 8px rgba(244,63,94,.7); }
.now-line::before { content:''; position:absolute; top:-1px; left:-4px; width:10px; height:10px; border-radius:50%; background:var(--accent-live); }

/* ── Detail panel (right side) ── */
.detail-panel {
  width:0; flex-shrink:0; overflow:hidden;
  background:var(--bg-2); border-left:1px solid var(--border-subtle);
  display:flex; flex-direction:column;
  transition:width .22s cubic-bezier(.16,1,.3,1);
}
.detail-panel.open { width:240px; }

.detail-inner { width:240px; padding:16px 14px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; }
.detail-inner::-webkit-scrollbar { width:2px; }
.detail-inner::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); }

.detail-channel { display:flex; align-items:center; gap:8px; }
.detail-ch-logo { width:28px; height:28px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; }
.detail-ch-name { font-size:11px; font-weight:500; color:var(--text-1); }

.detail-prog-title { font-size:15px; font-weight:700; color:var(--text-0); line-height:1.35; }

.detail-time-row { display:flex; align-items:center; gap:6px; }
.detail-live-badge { padding:2px 6px; border-radius:4px; font-size:9px; font-weight:700; background:var(--accent-live); color:#fff; letter-spacing:.05em; }
.detail-time { font-size:11px; color:var(--text-2); font-family:var(--font-mono); }
.detail-dur { font-size:10px; color:var(--text-3); }

.detail-progress { height:3px; background:var(--bg-4); border-radius:2px; overflow:hidden; }
.detail-progress-fill { height:100%; border-radius:2px; background:var(--accent-live); transition:width .3s; }

.detail-desc { font-size:11px; color:var(--text-1); line-height:1.6; }

.detail-divider { height:1px; background:var(--border-subtle); }

.detail-section-label { font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); }
.detail-up-next { display:flex; flex-direction:column; gap:6px; }
.detail-next-item { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.detail-next-title { font-size:11px; color:var(--text-1); flex:1; }
.detail-next-time { font-size:10px; color:var(--text-3); font-family:var(--font-mono); flex-shrink:0; }

.detail-actions { display:flex; gap:6px; margin-top:auto; padding-top:8px; }
.detail-btn-play {
  flex:1; padding:8px; border-radius:7px; font-size:12px; font-weight:600;
  background:var(--accent-interactive); border:none; color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:5px;
  transition:opacity .1s;
}
.detail-btn-play:hover { opacity:.85; }
.detail-btn-fav {
  width:34px; padding:8px; border-radius:7px; font-size:14px;
  background:var(--bg-3); border:1px solid var(--border-default); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .1s;
}
.detail-btn-fav:hover { background:var(--bg-4); }
</style>
</head>

function fmt(ms){ const d=new Date(ms); return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false}) }

// Channel list
const chList=document.getElementById('chList')
channels.forEach((ch,i)=>{
  const el=document.createElement('div')
  el.className='ch-row'+(i===0?' playing':'')
  el.innerHTML=`<div class="ch-logo" style="background:${ch.src}20;color:${ch.src};border:1px solid ${ch.src}30">${ch.prefix}</div><div style="flex:1;min-width:0"><div class="ch-name">${ch.name}</div><div class="ch-now-prog">${ch.nowProg}</div></div>${ch.fav?'<span style="font-size:9px;color:#fbbf24;flex-shrink:0">★</span>':''}<div style="width:5px;height:5px;border-radius:50%;background:${ch.src};flex-shrink:0"></div>`
  chList.appendChild(el)
})

// Time header
const timeHdr=document.getElementById('timeHdr')
const TOTAL_HOURS=8
for(let h=0;h<TOTAL_HOURS;h++){
  const t=new Date(winStart.getTime()+h*3600000)
  const s=document.createElement('div')
  s.className='time-slot'; s.style.width=HOUR_PX+'px'; s.textContent=fmt(t)
  const half=document.createElement('div'); half.className='half-mark'; s.appendChild(half)
  timeHdr.appendChild(s)
}

// Programme rows
const progRows=document.getElementById('progRows')
const totalW=HOUR_PX*TOTAL_HOURS
let selectedEl=null

progData.forEach((row,ci)=>{
  const ch=channels[ci]
  const rowEl=document.createElement('div'); rowEl.className='prog-row'
  const inner=document.createElement('div'); inner.className='prog-row-inner'; inner.style.width=totalW+'px'
  row.forEach(p=>{
    const left=(p.o/60)*HOUR_PX, width=(p.d/60)*HOUR_PX-3
    if(left+width<0||left>totalW)return
    const el=document.createElement('div')
    el.className='prog'+(p.now?' is-now':'')+(p.o+p.d<(now-winStart)/60000?' is-past':'')
    el.style.cssText=`left:${left}px;width:${width}px;background:${ch.src}1e;`
    el.innerHTML=`<div class="prog-title">${p.t}</div>${p.d>=30?`<div class="prog-dur">${fmt(winStart.getTime()+p.o*60000)}–${fmt(winStart.getTime()+(p.o+p.d)*60000)}</div>`:''}`
    el.addEventListener('click',()=>showDetail(p,ch,el))
    inner.appendChild(el)
  })
  rowEl.appendChild(inner); progRows.appendChild(rowEl)
})
document.getElementById('progCanvas').style.width=totalW+'px'

function showDetail(p,ch,el){
  if(selectedEl) selectedEl.classList.remove('selected')
  selectedEl=el; el.classList.add('selected')
  const panel=document.getElementById('detailPanel')
  panel.classList.add('open')
  const start=winStart.getTime()+p.o*60000
  const end=winStart.getTime()+(p.o+p.d)*60000
  const pct=p.now?Math.round(((now-start)/(end-start))*100):0
  const nowOffMin=(now-winStart)/60000
  const isNow=p.o<=nowOffMin&&p.o+p.d>nowOffMin
  // Find next programmes for this channel
  const ciIdx=channels.indexOf(ch)
  const upcoming=progData[ciIdx].filter(x=>x.o>p.o).slice(0,3)
  document.getElementById('detailInner').innerHTML=`
    <div class="detail-channel">
      <div class="detail-ch-logo" style="background:${ch.src}20;color:${ch.src};border:1px solid ${ch.src}30">${ch.prefix}</div>
      <span class="detail-ch-name">${ch.name}</span>
    </div>
    <div class="detail-prog-title">${p.t}</div>
    <div class="detail-time-row">
      ${isNow?'<span class="detail-live-badge">LIVE</span>':''}
      <span class="detail-time">${fmt(start)} – ${fmt(end)}</span>
      <span class="detail-dur">${p.d}min</span>
    </div>
    ${isNow?`<div class="detail-progress"><div class="detail-progress-fill" style="width:${pct}%"></div></div>`:''}
    ${p.x?`<div class="detail-desc">${p.x}</div>`:''}
    ${upcoming.length?`
    <div class="detail-divider"></div>
    <div class="detail-section-label">Up next</div>
    <div class="detail-up-next">
      ${upcoming.map(u=>`<div class="detail-next-item"><span class="detail-next-title">${u.t}</span><span class="detail-next-time">${fmt(winStart.getTime()+u.o*60000)}</span></div>`).join('')}
    </div>`:''}
    <div class="detail-actions">
      <button class="detail-btn-play">▶ Watch${isNow?' now':''}</button>
      <button class="detail-btn-fav">♡</button>
    </div>
  `
}

// Now line
const nowOff=(now-winStart)/60000
const nowLeft=(nowOff/60)*HOUR_PX
document.getElementById('nowLine').style.left=nowLeft+'px'

const ps=document.getElementById('progScroll')
ps.addEventListener('scroll',()=>{
  timeHdr.parentElement.scrollLeft=ps.scrollLeft
  chList.scrollTop=ps.scrollTop
})
chList.addEventListener('scroll',()=>{ ps.scrollTop=chList.scrollTop })

// Open guide immediately to show the difference vs A
document.getElementById('backdrop').style.display='block'
document.getElementById('sheet').style.display='flex'
// Pre-select the "In The Night Garden" block to show detail panel open
setTimeout(()=>{
  ps.scrollLeft=nowLeft-100
  timeHdr.parentElement.scrollLeft=nowLeft-100
  // click the first "now" programme block to pre-open detail
  const firstNow=document.querySelector('.prog.is-now')
  if(firstNow) firstNow.click()
},60)

document.getElementById('openGuideBtn').addEventListener('click',()=>{
  document.getElementById('backdrop').style.display='block'
  document.getElementById('sheet').style.display='flex'
  setTimeout(()=>{ ps.scrollLeft=nowLeft-100; timeHdr.parentElement.scrollLeft=nowLeft-100 },30)
})
document.getElementById('closeBtn').addEventListener('click',closeSheet)
document.getElementById('backdrop').addEventListener('click',closeSheet)
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeSheet() })
function closeSheet(){
  document.getElementById('backdrop').style.display='none'
  document.getElementById('sheet').style.display='none'
}
document.getElementById('prevBtn').addEventListener('click',()=>{ ps.scrollLeft-=HOUR_PX*2 })
document.getElementById('nextBtn').addEventListener('click',()=>{ ps.scrollLeft+=HOUR_PX*2 })
document.getElementById('nowBtn').addEventListener('click',()=>{ ps.scrollLeft=nowLeft-100 })
</script>
