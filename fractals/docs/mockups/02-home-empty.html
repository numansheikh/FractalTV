<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Fractals — Home (Empty State)</title>
<link rel="stylesheet" href="design-tokens.css">
<style>
  html, body { height: 100%; overflow: hidden; }

  /* === NAV RAIL === */
  .rail {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 48px;
    background: var(--bg-1);
    border-right: 1px solid var(--border-subtle);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0;
    z-index: 100;
    gap: 4px;
  }
  .rail-btn {
    position: relative;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-md);
    color: var(--text-2);
    cursor: pointer;
  }
  .rail-btn svg { width: 18px; height: 18px; }
  .rail-btn.active { color: var(--accent-interactive); }
  .rail-btn.active::before {
    content: '';
    position: absolute; left: -6px; top: 8px; bottom: 8px;
    width: 3px; border-radius: 0 2px 2px 0;
    background: var(--accent-interactive);
  }
  .rail-divider {
    width: 24px; height: 1px;
    background: var(--border-default);
    margin: 8px 0;
  }
  .rail-spacer { flex: 1; }

  /* === COMMAND BAR === */
  .command-bar {
    position: fixed; top: 0; left: 48px; right: 0;
    height: 44px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 90;
  }
  .cmd-dropdown {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-default);
    background: var(--bg-2);
    color: var(--text-2);
    font-size: 11px;
    white-space: nowrap;
    cursor: default;
    opacity: 0.5;
  }
  .cmd-dropdown svg { width: 10px; height: 10px; opacity: 0.5; }
  .search-input {
    flex: 1;
    display: flex; align-items: center; gap: 8px;
    padding: 0 12px;
    height: 30px;
    border-radius: var(--radius-full);
    background: var(--bg-2);
    border: 1px solid var(--border-subtle);
    color: var(--text-2);
    font-size: 12px;
    opacity: 0.5;
  }
  .search-input svg { width: 14px; height: 14px; color: var(--text-3); flex-shrink: 0; }
  .search-input span { color: var(--text-3); }

  /* === EMPTY STATE === */
  .content-area {
    position: fixed; top: 44px; left: 48px; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-state {
    display: flex; flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .empty-icon {
    color: var(--text-2);
    opacity: 0.3;
    margin-bottom: 4px;
  }
  .empty-icon svg { width: 56px; height: 56px; }
  .empty-heading {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-0);
  }
  .empty-desc {
    font-size: 13px;
    color: var(--text-1);
    max-width: 300px;
    line-height: 1.5;
  }
  .empty-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 8px 20px;
    border-radius: var(--radius-md);
    background: var(--accent-interactive);
    color: white;
    font-size: 13px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    margin-top: 4px;
  }
  .empty-hint {
    font-size: 10px;
    color: var(--text-2);
    margin-top: 8px;
  }
  .empty-hint kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 3px;
    background: var(--bg-3);
    border: 1px solid var(--border-default);
    color: var(--text-2);
  }
</style>
</head>
<body>

<!-- NAV RAIL -->
<nav class="rail">
  <div class="rail-btn active" title="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/></svg>
  </div>
  <div class="rail-btn" title="Live">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12L7 2"/><path d="M7 12l5-10"/><path d="M12 12l5-10"/><path d="M17 12l5-10"/><path d="M4.5 7h15"/><path d="M12 16v6"/><path d="M8 22h8"/></svg>
  </div>
  <div class="rail-btn" title="Films">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11v8a2 2 0 002 2h12a2 2 0 002-2v-8H4z"/><path d="M4 11l2-6h12l2 6"/><path d="M12 5l-1 6"/><path d="M8 5l-1 6"/><path d="M16 5l1 6"/></svg>
  </div>
  <div class="rail-btn" title="Series">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
  </div>
  <div class="rail-btn" title="Library">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
  </div>
  <div class="rail-divider"></div>
  <div class="rail-btn" title="Sources">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>
  </div>
  <div class="rail-spacer"></div>
  <div class="rail-btn" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
  </div>
</nav>

<!-- COMMAND BAR -->
<header class="command-bar">
  <div class="cmd-dropdown">
    All categories
    <svg viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>
  <div class="search-input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <span>Search movies, channels, actors...</span>
  </div>
  <div class="cmd-dropdown">
    Latest
    <svg viewBox="0 0 10 10"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
  </div>
</header>

<!-- EMPTY STATE -->
<main class="content-area">
  <div class="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="8,4 20,12 8,20"/></svg>
    </div>
    <div class="empty-heading">Add your first source</div>
    <div class="empty-desc">Connect an Xtream Codes account to start browsing your content.</div>
    <button class="empty-btn">Add source</button>
    <div class="empty-hint"><kbd>&#8984;,</kbd> to open settings</div>
  </div>
</main>

</body>
</html>
