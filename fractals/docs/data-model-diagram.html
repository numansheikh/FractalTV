<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractals — Data Model Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px;
  }
  svg { max-width: 900px; width: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 860 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow markers -->
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff" opacity="0.6"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#9c6dff" opacity="0.8"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e07040" opacity="0.8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2dba85" opacity="0.8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05555" opacity="0.8"/>
    </marker>
    <!-- Glow filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════ -->
  <!-- TITLE -->
  <!-- ══════════════════════════════════════════ -->
  <text x="430" y="32" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="3" fill="#7c4dff" opacity="0.9">FRACTALS — DATA MODEL</text>
  <text x="430" y="50" text-anchor="middle" font-size="10" fill="#444456" letter-spacing="1">provider data (ephemeral) · canonical identity (persistent) · user data (permanent)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LAYER 1: SOURCES -->
  <!-- ══════════════════════════════════════════ -->
  <!-- Layer background -->
  <rect x="20" y="70" width="820" height="130" rx="12" fill="#0a1929" stroke="#1e3a5f" stroke-width="1"/>
  <text x="40" y="92" font-size="9" font-weight="700" letter-spacing="2" fill="#4a9eff" opacity="0.7">LAYER 1 — PROVIDER DATA</text>
  <line x1="190" y1="89" x2="820" y2="89" stroke="#4a9eff" stroke-width="0.5" opacity="0.15"/>

  <!-- Source A (Xtream) -->
  <rect x="50" y="102" width="150" height="82" rx="8" fill="#0e2340" stroke="#4a9eff" stroke-width="1.5" opacity="0.9"/>
  <text x="125" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#4a9eff">Xtream Source A</text>
  <line x1="65" y1="126" x2="185" y2="126" stroke="#4a9eff" stroke-width="0.5" opacity="0.2"/>
  <text x="125" y="141" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">8,400 streams</text>
  <text x="125" y="157" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">live · movies · series</text>
  <text x="125" y="173" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">server_url / user / pass</text>

  <!-- Source B (Xtream) -->
  <rect x="225" y="102" width="150" height="82" rx="8" fill="#0e2340" stroke="#4a9eff" stroke-width="1.5" opacity="0.9"/>
  <text x="300" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#4a9eff">Xtream Source B</text>
  <line x1="240" y1="126" x2="360" y2="126" stroke="#4a9eff" stroke-width="0.5" opacity="0.2"/>
  <text x="300" y="141" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">12,200 streams</text>
  <text x="300" y="157" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">live · movies · series</text>
  <text x="300" y="173" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">server_url / user / pass</text>

  <!-- Source C (M3U) -->
  <rect x="400" y="102" width="150" height="82" rx="8" fill="#0e2340" stroke="#4a9eff" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="475" y="120" text-anchor="middle" font-size="10" font-weight="700" fill="#4a9eff" opacity="0.75">M3U File</text>
  <line x1="415" y1="126" x2="535" y2="126" stroke="#4a9eff" stroke-width="0.5" opacity="0.2"/>
  <text x="475" y="141" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">3,100 streams</text>
  <text x="475" y="157" text-anchor="middle" font-size="9" fill="#6090cc" font-family="monospace">live only</text>
  <text x="475" y="173" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">direct stream URLs</text>

  <!-- Sync label -->
  <rect x="600" y="112" width="210" height="60" rx="6" fill="#060c14" stroke="#1e3a5f" stroke-width="1" opacity="0.8"/>
  <text x="705" y="132" text-anchor="middle" font-size="9" font-weight="700" fill="#4a9eff" opacity="0.6" letter-spacing="1">SYNC WORKER</text>
  <text x="705" y="149" text-anchor="middle" font-size="9" fill="#445566">runs in worker thread</text>
  <text x="705" y="164" text-anchor="middle" font-size="9" fill="#445566">populates streams table</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ARROWS: Sources → Streams -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Source A → canonical (left merge path) -->
  <path d="M 125 184 L 125 218 L 355 218 L 355 288"
        stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.4"
        stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- Source B → canonical (middle) -->
  <path d="M 300 184 L 300 218 L 370 218 L 370 288"
        stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.4"
        stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- Source C → canonical (right merge) -->
  <path d="M 475 184 L 475 218 L 385 218 L 385 288"
        stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.4"
        stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- Converging label -->
  <text x="370" y="245" text-anchor="middle" font-size="9" fill="#4a9eff" opacity="0.5">23,700 streams → streams table</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- STREAMS TABLE (middle tier) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="200" y="288" width="340" height="70" rx="8" fill="#0a1424" stroke="#2a5080" stroke-width="1"/>
  <text x="370" y="307" text-anchor="middle" font-size="10" font-weight="700" fill="#4a9eff" opacity="0.8">streams</text>
  <text x="370" y="323" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">source_id · external_id · type · title · tvg_id</text>
  <text x="370" y="337" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">thumbnail_url · container_ext · stream_url</text>
  <!-- canonical_id FK highlight -->
  <rect x="288" y="344" width="164" height="16" rx="4" fill="#1a0d2e" stroke="#6040aa" stroke-width="1" opacity="0.7"/>
  <text x="370" y="355" text-anchor="middle" font-size="9" fill="#9c6dff" font-family="monospace" font-weight="700">canonical_id FK  ∅  (nullable)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- TMDB ENRICHMENT arrow -->
  <!-- ══════════════════════════════════════════ -->
  <!-- TMDB box on the right -->
  <rect x="630" y="310" width="160" height="52" rx="8" fill="#0a0820" stroke="#4a3080" stroke-width="1" opacity="0.8"/>
  <text x="710" y="328" text-anchor="middle" font-size="9" font-weight="700" fill="#7c4dff" opacity="0.8" letter-spacing="1">TMDB ENRICHMENT</text>
  <text x="710" y="343" text-anchor="middle" font-size="9" fill="#554488">background worker</text>
  <text x="710" y="356" text-anchor="middle" font-size="9" fill="#554488">BYOK · 40 req/s free</text>

  <!-- TMDB → canonical arrow -->
  <path d="M 630 340 L 568 340 L 568 410"
        stroke="#7c4dff" stroke-width="1.5" fill="none" opacity="0.5"
        marker-end="url(#arr-purple)"/>
  <text x="600" y="380" text-anchor="middle" font-size="8" fill="#7c4dff" opacity="0.6">matches + enriches</text>

  <!-- streams → canonical enrichment arrow -->
  <path d="M 370 362 L 370 408" stroke="#9c6dff" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#arr-purple)"/>
  <text x="390" y="393" font-size="8" fill="#9c6dff" opacity="0.6">tmdb_id match</text>
  <text x="390" y="403" font-size="8" fill="#9c6dff" opacity="0.5">many → one</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- CANONICAL TABLE -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="200" y="410" width="340" height="140" rx="10" fill="#100d1c" stroke="#5030a0" stroke-width="1.5" filter="url(#glow-purple)"/>
  <!-- Header -->
  <rect x="200" y="410" width="340" height="32" rx="10" fill="#1a1030"/>
  <rect x="200" y="428" width="340" height="14" fill="#1a1030"/>
  <text x="370" y="431" text-anchor="middle" font-size="11" font-weight="700" fill="#9c6dff" letter-spacing="0.5">canonical</text>
  <text x="535" y="431" text-anchor="end" font-size="8" fill="#554488" font-weight="600">PERSISTENT · SOURCE-INDEPENDENT</text>

  <!-- Free fields -->
  <text x="370" y="460" text-anchor="middle" font-size="9" fill="#7060aa" font-weight="700" letter-spacing="1">FREE TIER</text>
  <line x1="215" y1="464" x2="345" y2="464" stroke="#5030a0" stroke-width="0.5" opacity="0.4"/>
  <line x1="395" y1="464" x2="525" y2="464" stroke="#5030a0" stroke-width="0.5" opacity="0.4"/>

  <text x="250" y="478" text-anchor="middle" font-size="9" fill="#9c6dff" font-family="monospace">tmdb_id</text>
  <text x="370" y="478" text-anchor="middle" font-size="9" fill="#2dba85" font-family="monospace">title (EN)</text>
  <text x="490" y="478" text-anchor="middle" font-size="9" fill="#2dba85" font-family="monospace">original_title</text>

  <text x="250" y="493" text-anchor="middle" font-size="9" fill="#9c6dff" font-family="monospace">year</text>
  <text x="370" y="493" text-anchor="middle" font-size="9" fill="#9c6dff" font-family="monospace">genres</text>
  <text x="490" y="493" text-anchor="middle" font-size="9" fill="#9c6dff" font-family="monospace">poster_path</text>

  <!-- Pro fields (dimmed) -->
  <text x="370" y="515" text-anchor="middle" font-size="9" fill="#443366" font-weight="700" letter-spacing="1">PRO TIER</text>
  <line x1="215" y1="519" x2="325" y2="519" stroke="#5030a0" stroke-width="0.5" opacity="0.3"/>
  <line x1="415" y1="519" x2="525" y2="519" stroke="#5030a0" stroke-width="0.5" opacity="0.3"/>

  <text x="225" y="534" font-size="9" fill="#443366" font-family="monospace">cast · director</text>
  <text x="370" y="534" text-anchor="middle" font-size="9" fill="#443366" font-family="monospace">keywords</text>
  <text x="520" y="534" text-anchor="end" font-size="9" fill="#443366" font-family="monospace">embedding (384d)</text>

  <!-- Search badge -->
  <rect x="215" y="545" width="330" height="16" rx="4" fill="#0c1a10" stroke="#1a5040" stroke-width="1"/>
  <text x="380" y="556" text-anchor="middle" font-size="9" fill="#2dba85" font-weight="700">⌕  SEARCH INDEX on title + original_title · cross-language · single query</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- ARROW: canonical → user_data -->
  <!-- ══════════════════════════════════════════ -->
  <path d="M 370 550 L 370 598" stroke="#e07040" stroke-width="2" fill="none" opacity="0.7" marker-end="url(#arr-orange)"/>
  <text x="392" y="579" font-size="8" fill="#e07040" opacity="0.6">canonical_id FK</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- USER DATA TABLE -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="200" y="600" width="340" height="80" rx="10" fill="#120a06" stroke="#6a3010" stroke-width="1.5"/>
  <rect x="200" y="600" width="340" height="28" rx="10" fill="#1c1008"/>
  <rect x="200" y="616" width="340" height="12" fill="#1c1008"/>
  <text x="370" y="619" text-anchor="middle" font-size="11" font-weight="700" fill="#e07040" letter-spacing="0.5">user_data</text>
  <text x="535" y="619" text-anchor="end" font-size="8" fill="#5a3010" font-weight="600">PERMANENT · SURVIVES DELETION</text>

  <text x="225" y="645" font-size="9" fill="#c06030" font-family="monospace">favorited · watchlisted</text>
  <text x="370" y="645" text-anchor="middle" font-size="9" fill="#c06030" font-family="monospace">rating</text>
  <text x="525" y="645" text-anchor="end" font-size="9" fill="#c06030" font-family="monospace">last_position</text>

  <text x="225" y="660" font-size="9" fill="#c06030" font-family="monospace">completed</text>
  <text x="370" y="660" text-anchor="middle" font-size="9" fill="#c06030" font-family="monospace">last_watched_at</text>
  <text x="525" y="660" text-anchor="end" font-size="9" fill="#c06030" font-family="monospace">fav_sort_order</text>

  <text x="370" y="675" text-anchor="middle" font-size="8" fill="#5a3010">any row here = canonical record is permanent (never evicted)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- DELETION LIFECYCLE NOTE (right side) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="630" y="416" width="205" height="270" rx="10" fill="#0a080e" stroke="#2a1a40" stroke-width="1"/>
  <text x="732" y="435" text-anchor="middle" font-size="9" font-weight="700" fill="#7c4dff" opacity="0.7" letter-spacing="1.5">ON SOURCE DELETION</text>
  <line x1="645" y1="440" x2="820" y2="440" stroke="#2a1a40" stroke-width="1"/>

  <!-- Deleted box -->
  <rect x="648" y="452" width="170" height="36" rx="6" fill="#1a0808" stroke="#5a1818" stroke-width="1"/>
  <text x="733" y="466" text-anchor="middle" font-size="9" fill="#e05555" font-weight="700">streams rows</text>
  <text x="733" y="480" text-anchor="middle" font-size="9" fill="#6a2020">DELETED ✕</text>

  <!-- Arrow down -->
  <path d="M 733 488 L 733 506" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#arr-red)"/>

  <!-- Survives box -->
  <rect x="648" y="508" width="170" height="50" rx="6" fill="#0c1a12" stroke="#1a5030" stroke-width="1"/>
  <text x="733" y="524" text-anchor="middle" font-size="9" fill="#2dba85" font-weight="700">canonical rows</text>
  <text x="733" y="538" text-anchor="middle" font-size="9" fill="#1a7048">SURVIVES ✓</text>
  <text x="733" y="551" text-anchor="middle" font-size="8" fill="#144028">(if user-interacted)</text>

  <!-- Arrow down -->
  <path d="M 733 558 L 733 576" stroke="#444" stroke-width="1.5" fill="none" marker-end="url(#arr-orange)"/>

  <!-- Permanent box -->
  <rect x="648" y="578" width="170" height="50" rx="6" fill="#120c06" stroke="#5a3010" stroke-width="1"/>
  <text x="733" y="594" text-anchor="middle" font-size="9" fill="#e07040" font-weight="700">user_data rows</text>
  <text x="733" y="608" text-anchor="middle" font-size="9" fill="#8a4020">PERMANENT ✓</text>
  <text x="733" y="621" text-anchor="middle" font-size="8" fill="#5a2808">favorites / history safe</text>

  <!-- Eviction note -->
  <rect x="645" y="638" width="176" height="38" rx="5" fill="#0d0a06" stroke="#3a2808" stroke-width="1"/>
  <text x="733" y="653" text-anchor="middle" font-size="8" fill="#6a4818">uninteracted canonical rows</text>
  <text x="733" y="665" text-anchor="middle" font-size="8" fill="#6a4818">→ evictable (TTL / cleanup)</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- EPG (left side) -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="20" y="270" width="155" height="90" rx="8" fill="#060c14" stroke="#1e3a5f" stroke-width="1"/>
  <text x="97" y="289" text-anchor="middle" font-size="9" font-weight="700" fill="#4a9eff" opacity="0.6" letter-spacing="1">EPG</text>
  <line x1="30" y1="293" x2="162" y2="293" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="97" y="308" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">channel_external_id</text>
  <text x="97" y="323" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">start / end time</text>
  <text x="97" y="338" text-anchor="middle" font-size="9" fill="#445566" font-family="monospace">title · description</text>
  <text x="97" y="350" text-anchor="middle" font-size="8" fill="#334">matches via tvg_id</text>

  <!-- EPG → streams connector -->
  <path d="M 175 316 L 200 316" stroke="#2a5080" stroke-width="1" fill="none" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="155" y="312" text-anchor="end" font-size="7" fill="#2a5080">tvg_id</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- LEGEND (bottom) -->
  <!-- ══════════════════════════════════════════ -->
  <line x1="20" y1="700" x2="840" y2="700" stroke="#1a1a2a" stroke-width="1"/>

  <rect x="20" y="706" width="8" height="8" rx="2" fill="#1e3a5f" stroke="#4a9eff" stroke-width="1"/>
  <text x="34" y="714" font-size="9" fill="#445566">Provider layer (ephemeral)</text>

  <rect x="175" y="706" width="8" height="8" rx="2" fill="#160e2a" stroke="#9c6dff" stroke-width="1"/>
  <text x="189" y="714" font-size="9" fill="#445566">Canonical (persistent)</text>

  <rect x="330" y="706" width="8" height="8" rx="2" fill="#1a0f06" stroke="#e07040" stroke-width="1"/>
  <text x="344" y="714" font-size="9" fill="#445566">User data (permanent)</text>

  <line x1="490" y1="709" x2="510" y2="709" stroke="#4a9eff" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="516" y="714" font-size="9" fill="#445566">sync / enrichment flow</text>

  <line x1="640" y1="709" x2="660" y2="709" stroke="#2dba85" stroke-width="1.5" opacity="0.6"/>
  <text x="666" y="714" font-size="9" fill="#445566">search index field</text>

</svg>
</body>
</html>
